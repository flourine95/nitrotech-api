services:
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=nitrotech'
      - 'POSTGRES_USER=nitrotech'
      - 'POSTGRES_PASSWORD=nitrotech'
      - 'TZ=UTC'
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: 'redis:7-alpine'
    environment:
      - 'TZ=UTC'
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
