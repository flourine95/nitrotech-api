spring:
  application:
    name: nitrotech-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nitrotech}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  cache:
    type: redis

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-dev-secret-key-must-be-32-chars!!}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}

resend:
  api-key: ${RESEND_API_KEY}
  from: ${RESEND_FROM:noreply@yourdomain.com}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
