spring:
  application:
    name: nitrotech-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nitrotech}
    username: ${DB_USERNAME:nitrotech}
    password: ${DB_PASSWORD:nitrotech}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  # Cache
  cache:
    type: redis

server:
  port: ${SERVER_PORT:8080}

# Mail sender
mail:
  from: ${MAIL_FROM:noreply@yourdomain.com}

# Resend
resend:
  api-key: ${RESEND_API_KEY:}

# App
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  public-api-url: ${PUBLIC_API_URL:http://localhost:8080}
  shipping:
    default-provider: ${DEFAULT_SHIPPING_PROVIDER:ghtk}
    simulation-enabled: ${SHIPMENT_SIMULATION_ENABLED:false}
    free-threshold: ${SHIPPING_FREE_THRESHOLD:500000}
    flat-fee: ${SHIPPING_FLAT_FEE:30000}
    default-weight-grams: ${SHIPPING_DEFAULT_WEIGHT_GRAMS:1000}

# GHTK
ghtk:
  api-url: ${GHTK_API_URL:https://services.giaohangtietkiem.vn}
  token: ${GHTK_TOKEN:}
  client-source: ${GHTK_CLIENT_SOURCE:}
  real-shipment-enabled: ${GHTK_REAL_SHIPMENT_ENABLED:false}
  webhook-hash: ${GHTK_WEBHOOK_HASH:}
  pickup:
    name: ${GHTK_PICKUP_NAME:}
    tel: ${GHTK_PICKUP_TEL:}
    address-id: ${GHTK_PICKUP_ADDRESS_ID:}
    address: ${GHTK_PICKUP_ADDRESS:}
    province: ${GHTK_PICKUP_PROVINCE:}
    district: ${GHTK_PICKUP_DISTRICT:}
    ward: ${GHTK_PICKUP_WARD:}

# GHN
ghn:
  api-url: ${GHN_API_URL:https://online-gateway.ghn.vn/shiip/public-api}
  token: ${GHN_TOKEN:}
  shop-id: ${GHN_SHOP_ID:}
  client-id: ${GHN_CLIENT_ID:}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# SePay
sepay:
  payment-code-prefix: ${SEPAY_PAYMENT_CODE_PREFIX:NT}
  webhook-api-key: ${SEPAY_WEBHOOK_API_KEY:}
  account-number: ${SEPAY_ACCOUNT_NUMBER:123456789}
  bank-name: ${SEPAY_BANK_NAME:MBBank}

# OAuth
oauth:
  google:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:}
  github:
    client-id: ${GITHUB_OAUTH_CLIENT_ID:}
    client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    with-credentials: true   # send session cookie automatically
