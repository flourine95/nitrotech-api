spring:
  application:
    name: nitrotech-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nitrotech}
    username: ${DB_USERNAME:nitrotech}
    password: ${DB_PASSWORD:nitrotech}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Redis
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  # Cache
  cache:
    type: redis

server:
  port: ${SERVER_PORT:8080}

# Mail sender
mail:
  from: ${MAIL_FROM:noreply@yourdomain.com}

# Resend
resend:
  api-key: ${RESEND_API_KEY:}

# App
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# SePay
sepay:
  payment-code-prefix: ${SEPAY_PAYMENT_CODE_PREFIX:NT}
  webhook-api-key: ${SEPAY_WEBHOOK_API_KEY:}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    with-credentials: true   # send session cookie automatically
