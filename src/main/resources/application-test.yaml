# Cấu hình môi trường test (in-memory, không cần service bên ngoài)

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

  # Dùng cache in-memory thay vì Redis khi test
  cache:
    type: simple

  # Tắt session Redis khi test
  session:
    store-type: none

  mail:
    host: localhost
    port: 25
    username:
    password:
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

jwt:
  secret: test-secret-key-must-be-at-least-32-characters-long
  access-expiration-ms: 900000

mail:
  from: noreply@test.local

app:
  frontend-url: http://localhost:3000
  cookie:
    secure: false
    same-site: Lax
    domain:

cors:
  allowed-origins: http://localhost:3000

cloudinary:
  cloud-name: test-cloud
  api-key: test-api-key
  api-secret: test-api-secret

logging:
  level:
    com.nitrotech.api: DEBUG
