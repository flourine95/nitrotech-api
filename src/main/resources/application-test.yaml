# Cấu hình môi trường test (in-memory, không cần service bên ngoài)

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

  # Dùng cache in-memory thay vì Redis khi test
  cache:
    type: simple

mail:
  from: noreply@test.local

resend:
  api-key: test-resend-api-key

app:
  frontend-url: http://localhost:3000
  public-api-url: http://localhost:8080
  shipping:
    default-provider: ghtk
    default-weight-grams: 1000

ghtk:
  api-url: http://localhost:9099
  token: mock-token
  client-source: test
  pickup:
    name: Test Warehouse
    tel: "0909000000"
    address-id:
    address: 590 CMT8 P.11
    province: TP. Hồ Chí Minh
    district: Quận 3
    ward: Phường 1

ghn:
  api-url: http://localhost:9099
  token: mock-token
  shop-id: "123456"
  client-id: "654321"

sepay:
  payment-code-prefix: NT
  webhook-api-key: test-sepay-webhook-key
  account-number: "123456789"
  bank-name: MBBank

oauth:
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: http://localhost:8080/api/auth/oauth/google/callback
  github:
    client-id: test-github-client-id
    client-secret: test-github-client-secret
    redirect-uri: http://localhost:8080/api/auth/oauth/github/callback

cors:
  allowed-origins: http://localhost:3000

cloudinary:
  cloud-name: test-cloud
  api-key: test-api-key
  api-secret: test-api-secret

logging:
  level:
    com.nitrotech.api: DEBUG
