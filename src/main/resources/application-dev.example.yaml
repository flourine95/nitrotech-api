# Template cho local dev
# Copy file này: cp application-dev.example.yaml application-dev.yaml
# Sau đó chỉnh lại các giá trị phù hợp

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nitrotech?TimeZone=Asia/Ho_Chi_Minh
    username: nitrotech
    password: nitrotech
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      url: redis://localhost:6379
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 587
    username: your-mailtrap-username   # Lấy tại mailtrap.io → Sandboxes → SMTP Settings
    password: your-mailtrap-password

mail:
  from: noreply@yourdomain.com

jwt:
  secret: dev-secret-key-must-be-at-least-32-characters-long
  access-expiration-ms: 900000   # 15 phút

app:
  frontend-url: http://localhost:3000
  cookie:
    secure: false
    same-site: Lax
    domain:

cors:
  allowed-origins: http://localhost:3000,http://localhost:3001

cloudinary:
  cloud-name: your-cloud-name    # Lấy tại cloudinary.com/console
  api-key: your-api-key
  api-secret: your-api-secret

logging:
  level:
    com.nitrotech.api: DEBUG
    org.springframework.security: DEBUG
