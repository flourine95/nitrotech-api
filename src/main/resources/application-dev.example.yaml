# Template cho local dev
# Copy file này: cp application-dev.example.yaml application-dev.yaml
# Sau đó chỉnh lại các giá trị phù hợp

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nitrotech?TimeZone=Asia/Ho_Chi_Minh
    username: nitrotech
    password: nitrotech
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      url: redis://localhost:6379

resend:
  api-key: re_your_api_key       # Lấy tại resend.com
  from: onboarding@resend.dev    # Dùng email@yourdomain.com sau khi verify domain

jwt:
  secret: dev-secret-key-must-be-at-least-32-characters-long
  access-expiration-ms: 900000   # 15 phút

app:
  frontend-url: http://localhost:3000
  cookie:
    secure: false                # true khi dùng HTTPS (production)
    same-site: Lax
    domain:                      # để trống cho localhost

cors:
  allowed-origins: http://localhost:3000,http://localhost:3001

logging:
  level:
    com.nitrotech.api: DEBUG
    org.springframework.security: DEBUG

r2:
  endpoint: https://<account-id>.r2.cloudflarestorage.com
  access-key: your-r2-access-key
  secret-key: your-r2-secret-key
  bucket: your-bucket-name
  public-url: https://pub-<hash>.r2.dev  # hoặc custom domain
