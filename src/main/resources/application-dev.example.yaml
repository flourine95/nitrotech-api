# Template cho local dev
# Cách dùng: copy file này thành application-dev.yaml rồi điền giá trị thực
#   cp application-dev.example.yaml application-dev.yaml
# File application-dev.yaml đã được .gitignore — KHÔNG commit credentials thật

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nitrotech
    username: nitrotech
    password: nitrotech

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      url: redis://localhost:6379

  docker:
    compose:
      enabled: false

mail:
  from: NitroTech <noreply@send.yourdomain.com>

resend:
  api-key: paste-resend-api-key-here

app:
  frontend-url: http://localhost:3000
  public-api-url: http://localhost:8080
  shipping:
    default-provider: ghtk

cors:
  allowed-origins: http://localhost:3000,http://localhost:3001

cloudinary:
  cloud-name: your-cloud-name    # Lấy tại cloudinary.com/console
  api-key: your-api-key
  api-secret: your-api-secret

ghtk:
  api-url: https://services-staging.ghtklab.com
  token: paste-ghtk-staging-token-here

ghn:
  api-url: https://dev-online-gateway.ghn.vn/shiip/public-api
  token: paste-ghn-staging-token-here
  shop-id: paste-ghn-staging-shop-id-here
  client-id: paste-ghn-client-id-here

logging:
  level:
    com.nitrotech.api: DEBUG
    org.springframework.security: DEBUG
